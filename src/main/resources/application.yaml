spring:
  application:
    name: TB-CreditFlow
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crediflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
      enabled: true

jwt:
  # HS256 requires a key of at least 256 bits (32 bytes). Override via env in production.
  secret: ${JWT_SECRET:crediflow-default-dev-secret-key-change-me-0123456789-abcdef}
  expiration: ${JWT_EXPIRATION:86400000} # milliseconds (24h)

app:
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
